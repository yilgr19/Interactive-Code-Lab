<!DOCTYPE html>
<html lang="es" class="dark">
<head>
  <meta charset="UTF-8" />
  <script>
    (function () {
      var k = 'interactiveCodeLab_theme';
      var d = document.documentElement;
      try {
        if (localStorage.getItem(k) === 'light') d.classList.remove('dark');
        else d.classList.add('dark');
      } catch (e) {
        d.classList.add('dark');
      }
    })();
  </script>
  <script>
    (function () {
      try {
        var raw = localStorage.getItem('interactiveCodeLab_session');
        if (!raw) {
          window.location.replace('login.html');
          return;
        }
        var s = JSON.parse(raw);
        if (!s || !s.userId) {
          window.location.replace('login.html');
          return;
        }
        if (s.role !== 'teacher') {
          if (s.role === 'student') window.location.replace('index.html');
          else if (s.role === 'admin') window.location.replace('admin.html');
          else window.location.replace('login.html');
        }
      } catch (e) {
        window.location.replace('login.html');
      }
    })();
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Docente · Interactive Code Lab</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            lab: {
              bg: 'rgb(var(--lab-bg) / <alpha-value>)',
              surface: 'rgb(var(--lab-surface) / <alpha-value>)',
              border: 'rgb(var(--lab-border) / <alpha-value>)',
              accent: 'rgb(var(--lab-accent) / <alpha-value>)',
              accentDim: 'rgb(var(--lab-accentDim) / <alpha-value>)',
              success: 'rgb(var(--lab-success) / <alpha-value>)',
              warning: 'rgb(var(--lab-warning) / <alpha-value>)',
            }
          },
          fontFamily: {
            mono: ['JetBrains Mono', 'Fira Code', 'Consolas', 'monospace'],
            sans: ['Inter', 'system-ui', 'sans-serif'],
          }
        }
      }
    };
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="min-h-screen bg-lab-bg text-slate-200 font-sans antialiased">
  <header class="sticky top-0 z-40 border-b border-lab-border bg-lab-bg/90 backdrop-blur-md">
    <div class="flex flex-wrap items-center justify-between gap-3 px-4 py-3 sm:px-6">
      <div>
        <p class="font-mono text-xs text-lab-accent">Rol docente</p>
        <h1 class="font-mono text-lg font-semibold text-white">Seguimiento de estudiantes</h1>
        <p id="teacher-welcome" class="mt-1 text-sm text-slate-400"></p>
      </div>
      <div class="flex flex-wrap items-center gap-2">
        <button type="button" class="theme-toggle-btn rounded-lg border border-lab-border bg-lab-surface/60 p-2 text-lab-accent transition hover:bg-lab-accent/10 focus:outline-none focus-visible:ring-2 focus-visible:ring-lab-accent/50" aria-label="Cambiar tema" title="Tema">
          <svg data-icon="sun" class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" /></svg>
          <svg data-icon="moon" class="hidden h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" /></svg>
        </button>
        <button type="button" id="teacher-logout" class="rounded-lg border border-lab-border bg-lab-surface/60 px-3 py-2 text-xs font-medium text-slate-300 transition hover:bg-lab-accent/10 hover:text-lab-accent">Cerrar sesión</button>
      </div>
    </div>
  </header>

  <main class="mx-auto max-w-5xl space-y-8 px-4 py-8 sm:px-6">
    <p class="text-sm text-slate-400">
      Vista de solo lectura del avance registrado en este navegador. Para crear o editar cuentas, el <strong class="text-slate-300">administrador</strong> usa el panel de administración.
    </p>

    <section class="rounded-2xl border border-lab-border bg-lab-surface/50 p-6">
      <h2 class="text-lg font-semibold text-white">Listado de estudiantes</h2>
      <div class="mt-4 overflow-x-auto rounded-xl border border-lab-border">
        <table class="w-full min-w-[600px] text-left text-sm">
          <thead class="border-b border-lab-border bg-lab-bg/50 text-xs uppercase tracking-wider text-slate-500">
            <tr>
              <th class="px-3 py-3">Estudiante</th>
              <th class="px-3 py-3">Usuario</th>
              <th class="px-3 py-3">Activo</th>
              <th class="px-3 py-3">Puntos</th>
              <th class="px-3 py-3">Cuestionarios</th>
              <th class="px-3 py-3">Último tema</th>
            </tr>
          </thead>
          <tbody id="teacher-tbody" class="divide-y divide-lab-border text-slate-300"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="js/users-store.js"></script>
  <script src="js/teacher.js"></script>
</body>
</html>
